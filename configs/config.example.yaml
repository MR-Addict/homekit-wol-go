homekit:
  # pin defaults to "001-02-003"
  name: "Wake Targets"
  storage_path: "./db"
  manufacturer: "homekit-wol"
  model: "wake-switch"
  firmware: "1.0.0"
  # listen_address: ":32042"
  # interfaces:
  #   - "eth0"

wol:
  # Prefer your subnet broadcast address when you know it, for example "192.168.1.255".
  # If left at 255.255.255.255, homekit-wol also tries active interface broadcasts.
  broadcast_ip: "255.255.255.255"
  port: 9

devices:
  - name: "Gaming PC"
    mac: "00:11:22:33:44:55"
  - name: "NAS"
    mac: "66:77:88:99:aa:bb"
